<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c7a961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Anillo exterior (banda principal) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#ringGradient)" stroke-width="6" filter="url(#ringGlow)"/>
  
  <!-- Brillo de anillo -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#e8d5a8" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,10"/>
  
  <!-- Diamante/piedra (opcional, en la parte superior) -->
  <g transform="translate(32, 12)">
    <!-- Piedra con brillo -->
    <circle cx="0" cy="0" r="3.5" fill="url(#ringGradient)" filter="url(#ringGlow)"/>
    <circle cx="0" cy="0" r="2" fill="#f0e8d8" opacity="0.8"/>
  </g>
  
  <!-- Decoración interior -->
  <path d="M 15 32 Q 32 20 49 32" stroke="url(#ringGradient)" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M 15 32 Q 32 44 49 32" stroke="url(#ringGradient)" stroke-width="0.5" fill="none" opacity="0.5"/>
</svg>